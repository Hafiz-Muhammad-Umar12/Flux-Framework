site_name: Flux Agents
site_description: A Python-first Agentic AI Framework — provider-agnostic, async-first, middleware-driven
site_url: https://flux-agents.github.io/flux
repo_url: https://github.com/Hafiz-Muhammad-Umar12/Flux-Framework
repo_name: Flux-Framework/flux
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024 – 2026 Flux Contributors

theme:
  name: material
  language: en
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  palette:
    # Dark mode (default)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      icon:
        material: weather-night
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      icon:
        material: weather-sunny
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    logo: material/robot
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.code.line-highlight
    - content.tooltips
    - content.tabs.link
    - toc.follow
    - toc.integrate

# extra:
#   version:
#     provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Hafiz-Muhammad-Umar12/Flux-Framework
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/flux-agents/
      name: PyPI
    - icon: fontawesome/brands/twitter
      link: https://x.com/muhaammad_umar_
      name: Twitter

# analytics:
#   provider: google
#   property: G-XXXXXXXXXX

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      # Updated to materialx namespace for Material 9.x compatibility
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      css_class: highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s-.]+'
      lang:
        - en
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            heading_level: 2
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            line_length: 80
            signature_crossrefs: true

